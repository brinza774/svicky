<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Svíčky s láskou</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #fff8f0;
    }
    header {
        background-color: #d4a373;
        color: white;
        padding: 20px;
        text-align: center;
    }
    .container {
        padding: 20px;
    }
    .product {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 15px;
        margin: 10px;
        display: inline-block;
        width: 250px;
        background: white;
    }
    .product img {
        width: 100%;
        border-radius: 10px;
    }
    button {
        background-color: #d4a373;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background-color: #b08968;
    }
    footer {
        text-align: center;
        padding: 10px;
        background-color: #eee;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>
    <h1>🕯️ Svíčky s láskou</h1>
    <p>Ručně vyráběné svíčky</p>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Svíčka 1">
        <h3>Levandulová svíčka</h3>
        <p>Vůně levandule pro relaxaci.</p>
        <p><strong>150 Kč</strong></p>
        <button onclick="alert('Kontaktuj nás pro objednávku!')">Koupit</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Svíčka 2">
        <h3>Vanilková svíčka</h3>
        <p>Sladká a uklidňující vůně.</p>
        <p><strong>140 Kč</strong></p>
        <button onclick="alert('Kontaktuj nás pro objednávku!')">Koupit</button>
    </div>

</div>

<footer>
    <p>Kontakt: tvuj@email.cz</p>
</footer>

</body>
</html>
